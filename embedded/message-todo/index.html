<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <link rel="stylesheet" crossorigin href="./assets/index-CSRTDniH.css?v=20260609-todo-no-head">
  </head>
  <body>
    <div id="root"></div>
    <script>
      (function () {
        function decorateApprovalLinks() {
          document.querySelectorAll('a[href*="approval-form.html"]').forEach(function (link) {
            link.setAttribute('target', '_blank');
            link.setAttribute('rel', 'noopener noreferrer');
          });
        }
        document.addEventListener('DOMContentLoaded', decorateApprovalLinks);
        document.addEventListener('click', function (event) {
          const link = event.target && event.target.closest ? event.target.closest('a[href*="approval-form.html"]') : null;
          if (!link) return;
          link.setAttribute('target', '_blank');
          link.setAttribute('rel', 'noopener noreferrer');
        }, true);
        new MutationObserver(decorateApprovalLinks).observe(document.documentElement, { childList: true, subtree: true });
      })();
    </script>
  </body>
</html>
