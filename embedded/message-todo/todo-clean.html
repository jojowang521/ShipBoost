<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ai-demo-shell</title>
    <script type="module" crossorigin src="./assets/index-CEoZRuVF.js?v=20260609-todo-stream-clean"></script>
    <link rel="stylesheet" crossorigin href="./assets/index-CSRTDniH.css?v=20260609-todo-stream-clean">
  </head>
  <body>
    <div id="root"></div>
    <script>
      (function () {
        function decorateApprovalLinks() {
          document.querySelectorAll('a[href*="approval-form.html"]').forEach(function (link) {
            link.setAttribute('target', '_blank');
            link.setAttribute('rel', 'noopener noreferrer');
          });
        }
        function cleanStreamingTodoRows() {
          document.querySelectorAll('.chat-agent-content table tr').forEach(function (row) {
            const text = row.textContent || '';
            const hasRawMarkdown = /\[[^\]]*(?:\]\([^)]*)?$|\]\([^)]*$|^\s*\|/.test(text);
            const hasSeparator = /^\s*:?-{2,}:?\s*$/.test(text.replace(/\s+/g, ''));
            if (hasRawMarkdown || hasSeparator) {
              row.style.visibility = 'hidden';
              row.setAttribute('data-streaming-row', 'pending');
              return;
            }
            if (row.getAttribute('data-streaming-row') === 'pending') {
              row.style.visibility = '';
              row.removeAttribute('data-streaming-row');
            }
          });
        }
        function refreshTodoView() {
          decorateApprovalLinks();
          cleanStreamingTodoRows();
        }
        document.addEventListener('DOMContentLoaded', refreshTodoView);
        document.addEventListener('click', function (event) {
          const link = event.target && event.target.closest ? event.target.closest('a[href*="approval-form.html"]') : null;
          if (!link) return;
          link.setAttribute('target', '_blank');
          link.setAttribute('rel', 'noopener noreferrer');
        }, true);
        new MutationObserver(refreshTodoView).observe(document.documentElement, { childList: true, subtree: true, characterData: true });
      })();
    </script>
  </body>
</html>
