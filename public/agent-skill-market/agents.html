<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>智能体</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f8fa;
      --card: #fff;
      --text: #1f2329;
      --muted: #646a73;
      --line: #e9edf2;
      --active: #3478f6;
      --detail-hover-bg: #f2f4f6;
      --detail-hover-border: #eef1f5;
      --shadow: 0 1px 2px rgba(15, 23, 42, .04);
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; }
    html, body { width: 100%; height: 100%; margin: 0; }
    body { overflow: hidden; background: var(--bg); color: var(--text); }

    .market-page {
      display: flex;
      flex-direction: column;
      width: min(100%, 1438px);
      height: 100%;
      padding: 12px 100px 8px;
      margin: 0 auto;
      overflow: hidden;
      scrollbar-width: none;
      -ms-overflow-style: none;
      background: #f7f8fa;
    }

    .market-page::-webkit-scrollbar {
      width: 0;
      height: 0;
      display: none;
    }

    .market-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      width: 100%;
      min-height: 36px;
      margin: 0 0 16px;
      flex: 0 0 auto;
    }

    h1 {
      margin: 0;
      color: #25272c;
      font-size: 18px;
      font-weight: 700;
      line-height: 24px;
      letter-spacing: 0;
    }

    .market-controls {
      display: flex;
      align-items: center;
      justify-content: flex-start;
      gap: 16px;
      width: 100%;
      margin: 0 0 16px;
      flex: 0 0 auto;
    }

    .market-search {
      display: flex;
      align-items: center;
      width: 240px;
      min-width: 240px;
      max-width: 240px;
      height: 32px;
      min-height: 32px;
      max-height: 32px;
      flex: 0 0 240px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: #999;
      font-size: 13px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .market-search:focus-within {
      border-color: #ddd;
      box-shadow: var(--shadow);
    }

    .market-search input {
      min-width: 0;
      flex: 1 1 auto;
      height: 100%;
      padding: 0 8px 0 12px;
      border: 0;
      outline: 0;
      background: transparent;
      color: #333;
      font: inherit;
      line-height: 22px;
    }

    .market-search input::placeholder {
      color: #999;
    }

    .market-search input::-webkit-search-decoration,
    .market-search input::-webkit-search-cancel-button {
      appearance: none;
      -webkit-appearance: none;
    }

    .market-search__addon {
      display: inline-flex;
      width: 32px;
      height: 100%;
      flex: 0 0 32px;
      align-items: center;
      justify-content: center;
      border-left: 1px solid #ddd;
      background: #fff;
    }

    .market-search__addon img {
      display: block;
      width: 16px;
      height: 16px;
    }

    .market-tabs {
      display: flex;
      gap: 12px;
      min-width: 0;
      flex: 1 1 auto;
      margin: 0;
      padding: 0;
      overflow-x: auto;
      height: 32px;
      align-items: flex-start;
    }

    .market-tab {
      flex: 0 0 auto;
      height: 32px;
      padding: 3px 12px;
      border: 0;
      border-radius: 8px;
      background: transparent;
      color: #555d6b;
      font-size: 13px;
      font-weight: 500;
      line-height: 22px;
      cursor: pointer;
    }

    .market-tab:hover {
      background: #f2f4f6;
    }

    .market-tab.active {
      background: #e9ecff;
      color: #222;
    }

    .agent-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(230px, 1fr));
      gap: 16px;
      width: 100%;
      margin: 0;
    }

    .market-scroll {
      flex: 1 1 auto;
      min-height: 0;
      overflow: auto;
      padding: 0 0 8px;
      scrollbar-width: none;
      -ms-overflow-style: none;
    }

    .market-scroll::-webkit-scrollbar {
      width: 0;
      height: 0;
      display: none;
    }

    .agent-card {
      min-height: 150px;
      padding: 18px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: var(--card);
      box-shadow: var(--shadow);
      cursor: pointer;
      transition: transform .18s ease, box-shadow .18s ease, border-color .18s ease;
    }

    .agent-card:hover,
    .agent-card:focus-visible {
      transform: translateY(-2px);
      border-color: #cfe0ff;
      box-shadow: 0 8px 24px rgba(15, 23, 42, .08);
    }

    .agent-card:focus-visible {
      outline: 2px solid rgba(81, 71, 255, .24);
      outline-offset: 2px;
    }

    .agent-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
    }

    .agent-id {
      display: flex;
      align-items: center;
      min-width: 0;
      gap: 10px;
    }

    .agent-avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      overflow: hidden;
      background: #eef5ff;
      flex: 0 0 auto;
    }

    .agent-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .agent-card h2 {
      margin: 0;
      overflow: hidden;
      color: #22252b;
      font-size: 14px;
      font-weight: 600;
      line-height: 1.35;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .agent-action {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      height: 28px;
      min-width: 52px;
      padding: 0 12px;
      border: 1px solid #d8dde6;
      border-radius: 8px;
      background: #fff;
      color: #4e5969;
      font-size: 12px;
      font-weight: 500;
      line-height: 26px;
      white-space: nowrap;
      cursor: pointer;
      opacity: 0;
      pointer-events: none;
      transition: opacity .16s ease, border-color .16s ease, color .16s ease, background .16s ease;
    }

    .agent-card:hover .agent-action,
    .agent-card:focus-within .agent-action {
      opacity: 1;
      pointer-events: auto;
    }

    .agent-action:hover {
      border-color: #C7D1FF;
      color: #3456F0;
      background: #fff;
    }

    .agent-card p {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.65;
    }

    .agent-detail-backdrop {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 42px 70px;
      background: rgba(0, 0, 0, .34);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      opacity: 0;
      pointer-events: none;
      transition: opacity 200ms ease;
    }

    .agent-detail-backdrop.opening,
    .agent-detail-backdrop.open {
      opacity: 1;
      pointer-events: auto;
    }

    .agent-detail-backdrop.closing {
      opacity: 0;
      pointer-events: none;
    }

    .agent-detail-dialog {
      display: flex;
      width: min(1242px, calc(100vw - 140px));
      height: min(700px, calc(100vh - 84px));
      min-height: 540px;
      flex-direction: column;
      overflow: hidden;
      border-radius: 12px;
      background: #fff;
      box-shadow: 0 16px 38px rgba(15, 23, 42, .18);
      color: #333;
      opacity: 0;
      transform: translateY(8px) scale(.992);
      transition: opacity 200ms ease, transform 200ms ease;
    }

    .agent-detail-backdrop.opening .agent-detail-dialog,
    .agent-detail-backdrop.open .agent-detail-dialog {
      opacity: 1;
      transform: translateY(0) scale(1);
    }

    .agent-detail-backdrop.closing .agent-detail-dialog {
      opacity: 0;
      transform: translateY(8px) scale(.992);
    }

    .agent-detail-header {
      display: flex;
      flex: 0 0 auto;
      align-items: center;
      justify-content: space-between;
      padding: 16px 18px 8px;
    }

    .agent-detail-fixed {
      flex: 0 0 auto;
      padding: 12px 18px 0;
      background: #fff;
    }

    .agent-detail-title {
      margin: 0;
      color: #222;
      font-size: 18px;
      font-weight: 600;
      line-height: 26px;
    }

    .agent-detail-close {
      display: inline-flex;
      width: 28px;
      height: 28px;
      align-items: center;
      justify-content: center;
      border: 0;
      border-radius: 8px;
      background: transparent;
      color: #999;
      cursor: pointer;
      transition: background-color .16s ease;
    }

    .agent-detail-close img {
      display: block;
      width: 28px;
      height: 28px;
      pointer-events: none;
    }

    .agent-detail-close:hover {
      background: #f7f8fa;
    }

    .agent-detail-close:focus {
      outline: none;
    }

    .agent-detail-close:focus-visible {
      box-shadow: 0 0 0 2px rgba(81, 71, 255, .18);
    }

    .agent-detail-body {
      flex: 1 1 auto;
      min-height: 0;
      overflow: auto;
      padding: 0 18px 8px;
      scrollbar-width: none;
      -ms-overflow-style: none;
    }

    .agent-detail-body::-webkit-scrollbar {
      width: 0;
      height: 0;
      display: none;
    }

    .agent-detail-profile {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 16px;
      padding-bottom: 16px;
      border-bottom: 1px solid #f2f4f6;
    }

    .agent-detail-avatar {
      width: 44px;
      height: 44px;
      flex: 0 0 44px;
      overflow: hidden;
      border: 1.4px solid #fff;
      border-radius: 50%;
      background: #cdf;
      box-shadow: 0 2px 6px rgba(0, 0, 0, .08);
    }

    .agent-detail-avatar img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .agent-detail-summary {
      display: flex;
      min-width: 0;
      flex: 1;
      flex-direction: column;
      gap: 8px;
    }

    .agent-detail-heading {
      display: flex;
      min-width: 0;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
    }

    .agent-detail-identity {
      display: flex;
      min-width: 0;
      flex-direction: column;
      gap: 6px;
    }

    .agent-detail-tags {
      display: flex;
      min-width: 0;
      align-items: center;
      flex-wrap: wrap;
      gap: 6px;
    }

    .agent-detail-name {
      color: #333;
      font-size: 16px;
      font-weight: 600;
      line-height: 22px;
      white-space: nowrap;
    }

    .agent-detail-tag {
      display: inline-flex;
      height: 20px;
      min-width: 20px;
      align-items: center;
      justify-content: center;
      flex: 0 0 auto;
      padding: 0 6px;
      border-radius: 4px;
      background: #f2f4f6;
      color: #576275;
      font-size: 12px;
      font-weight: 400;
      line-height: 20px;
      white-space: nowrap;
    }

    .agent-detail-tag.online {
      background: #d7f5e5;
      color: #13a374;
    }

    .agent-detail-desc {
      margin: 0;
      color: #4e5969;
      font-size: 13px;
      font-weight: 400;
      line-height: 22px;
    }

    .agent-detail-tabs {
      display: flex;
      align-items: center;
      gap: 8px;
      height: 32px;
      margin-bottom: 14px;
    }

    .agent-detail-tab {
      height: 32px;
      padding: 3px 12px;
      border: 0;
      border-radius: 8px;
      background: transparent;
      color: #666;
      font-size: 13px;
      font-weight: 400;
      line-height: 22px;
      cursor: pointer;
      transition: background-color .16s ease, color .16s ease;
    }

    .agent-detail-tab:hover:not(.active) {
      background: var(--detail-hover-bg);
      color: #333;
    }

    .agent-detail-tab.active {
      background: #e9ecff;
      color: #333;
      font-weight: 500;
    }

    .agent-detail-section {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 16px;
    }

    .agent-detail-section-title {
      display: flex;
      align-items: center;
      gap: 8px;
      min-height: 32px;
      color: #333;
      font-size: 14px;
      font-weight: 600;
      line-height: 22px;
    }

    .agent-detail-section-title img {
      width: 16px;
      height: 16px;
      flex: 0 0 auto;
    }

    .agent-detail-instructions {
      padding: 9px 12px;
      border-radius: 8px;
      background: rgba(247, 248, 250, .75);
      color: #333;
      font-size: 13px;
      line-height: 22px;
    }

    .agent-detail-instructions ul {
      margin: 0;
      padding-left: 18px;
    }

    .agent-detail-questions {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .agent-detail-question {
      display: flex;
      min-height: 40px;
      width: 100%;
      align-items: center;
      gap: 8px;
      padding: 9px 12px;
      border: 1px solid #f2f4f6;
      border-radius: 8px;
      background: #fff;
      color: #333;
      font-size: 13px;
      line-height: 22px;
      text-align: left;
      cursor: pointer;
      transition: background-color .16s ease, border-color .16s ease;
    }

    .agent-detail-question:hover {
      border-color: var(--detail-hover-border);
      background: var(--detail-hover-bg);
    }

    .agent-detail-question span {
      flex: 1;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .agent-detail-question svg {
      width: 14px;
      height: 14px;
      flex: 0 0 auto;
      color: #999;
      opacity: 0;
      transition: opacity 160ms ease;
    }

    .agent-detail-question:hover svg,
    .agent-detail-question:focus-visible svg {
      opacity: 1;
    }

    .agent-detail-content {
      display: none;
    }

    .agent-detail-panel[data-panel="basic"] .agent-detail-content[data-content="basic"],
    .agent-detail-panel[data-panel="skills"] .agent-detail-content[data-content="skills"],
    .agent-detail-panel[data-panel="records"] .agent-detail-content[data-content="records"],
    .agent-detail-panel[data-panel="artifacts"] .agent-detail-content[data-content="artifacts"] {
      display: block;
    }

    .agent-detail-skill-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
    }

    .agent-skill-card {
      display: flex;
      min-height: 108px;
      flex-direction: column;
      gap: 12px;
      padding: 13px 17px;
      border: 1px solid #f2f4f6;
      border-radius: 12px;
      background: #fff;
      box-shadow: 0 1px 2px rgba(15, 23, 42, .04);
      cursor: pointer;
      transition: background-color .16s ease, border-color .16s ease;
    }

    .agent-skill-card:hover {
      border-color: var(--detail-hover-border);
      background: var(--detail-hover-bg);
    }

    .agent-skill-card__top {
      display: flex;
      min-width: 0;
      align-items: center;
      gap: 8px;
    }

    .agent-skill-card__icon {
      display: inline-flex;
      width: 44px;
      height: 44px;
      flex: 0 0 44px;
      align-items: center;
      justify-content: center;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
      line-height: 24px;
    }

    .agent-skill-card__icon.tone-blue {
      background: #eef4ff;
      color: #2f6fff;
    }

    .agent-skill-card__icon.tone-green {
      background: #e9fbf4;
      color: #13a374;
    }

    .agent-skill-card__icon.tone-orange {
      background: #fff2dc;
      color: #f59a23;
    }

    .agent-skill-card__title {
      min-width: 0;
      overflow: hidden;
      color: #333;
      font-size: 14px;
      font-weight: 600;
      line-height: 22px;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .agent-skill-card__desc {
      margin: 0;
      color: #999;
      font-size: 12px;
      font-weight: 400;
      line-height: 20px;
    }

    .agent-detail-record-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .agent-record-card {
      display: flex;
      min-height: 70px;
      flex-direction: column;
      justify-content: center;
      gap: 4px;
      padding: 12px;
      border: 1px solid #f2f4f6;
      border-radius: 8px;
      background: #fff;
      cursor: pointer;
      transition: background-color .16s ease, border-color .16s ease;
    }

    .agent-record-card:hover {
      border-color: var(--detail-hover-border);
      background: var(--detail-hover-bg);
    }

    .agent-record-card__top {
      display: flex;
      min-width: 0;
      align-items: center;
      gap: 4px;
    }

    .agent-record-card__title-wrap {
      display: flex;
      min-width: 0;
      flex: 1;
      align-items: center;
      gap: 8px;
    }

    .agent-record-card__icon {
      width: 16px;
      height: 16px;
      flex: 0 0 16px;
      display: block;
    }

    .agent-record-card__title {
      min-width: 0;
      overflow: hidden;
      color: #333;
      font-size: 13px;
      font-weight: 600;
      line-height: 22px;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .agent-record-card__meta {
      flex: 0 0 auto;
      color: #999;
      font-size: 12px;
      line-height: 20px;
      white-space: nowrap;
    }

    .agent-record-card__desc {
      margin: 0;
      overflow: hidden;
      color: #999;
      font-size: 12px;
      line-height: 20px;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .agent-detail-artifact-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
    }

    .agent-artifact-card {
      display: flex;
      height: 56px;
      min-width: 0;
      align-items: center;
      gap: 8px;
      padding: 6px 12px;
      border: 1px solid #f2f4f6;
      border-radius: 12px;
      background: #fff;
      cursor: pointer;
      transition: background-color .16s ease, border-color .16s ease;
    }

    .agent-artifact-card:hover {
      border-color: var(--detail-hover-border);
      background: var(--detail-hover-bg);
    }

    .agent-file-icon {
      width: 32px;
      height: 32px;
      flex: 0 0 32px;
      display: block;
    }

    .agent-artifact-card__main {
      min-width: 0;
      flex: 1;
    }

    .agent-artifact-card__title {
      display: block;
      min-width: 0;
      overflow: hidden;
      color: #333;
      font-size: 14px;
      font-weight: 400;
      line-height: 22px;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .agent-artifact-card__meta {
      display: block;
      color: #999;
      font-size: 12px;
      line-height: 20px;
      white-space: nowrap;
    }

    .agent-detail-footer {
      display: flex;
      flex: 0 0 auto;
      align-items: center;
      justify-content: flex-end;
      gap: 12px;
      padding: 20px 18px 16px;
    }

    .agent-detail-btn {
      display: inline-flex;
      min-width: 80px;
      height: 32px;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 5px 12px;
      border: 1px solid #ddd;
      border-radius: 8px;
      background: #fff;
      color: #333;
      font-size: 13px;
      line-height: 22px;
      cursor: pointer;
      transition: background-color .16s ease, border-color .16s ease, color .16s ease;
    }

    .agent-detail-btn:hover {
      border-color: var(--detail-hover-border);
      background: var(--detail-hover-bg);
      color: #333;
    }

    .agent-detail-btn.primary {
      width: 80px;
      border-color: #5147ff;
      background: #5147ff;
      color: #fff;
    }

    .agent-detail-btn.primary:hover {
      border-color: #5147ff;
      background: #5147ff;
      color: #fff;
    }

    .agent-detail-btn img,
    .agent-detail-btn svg {
      width: 16px;
      height: 16px;
      flex: 0 0 auto;
    }

    @media (max-width: 1180px) {
      .market-page {
        width: 100%;
        padding: 12px 32px 8px;
      }
      .agent-grid { grid-template-columns: repeat(3, minmax(220px, 1fr)); }
      .agent-detail-backdrop { padding: 32px; }
      .agent-detail-dialog {
        width: calc(100vw - 64px);
      }
    }
    @media (max-width: 820px) {
      .market-head {
        align-items: stretch;
        flex-direction: column;
        height: auto;
        gap: 12px;
      }
      .market-page { width: 100%; }
      .market-controls { align-items: stretch; flex-direction: column; gap: 12px; }
      .market-search {
        width: 100%;
        min-width: 0;
        max-width: none;
        flex: 0 0 32px;
      }
      .agent-grid { grid-template-columns: 1fr; }
      .agent-detail-backdrop { padding: 16px; }
      .agent-detail-dialog {
        width: calc(100vw - 32px);
        height: calc(100vh - 32px);
        min-height: 0;
      }
      .agent-detail-heading {
        flex-direction: column;
        gap: 8px;
      }
      .agent-detail-fixed {
        padding: 12px 18px 0;
      }
      .agent-detail-desc,
      .agent-detail-question span {
        white-space: normal;
      }
      .agent-detail-tabs {
        overflow-x: auto;
      }
      .agent-detail-skill-grid,
      .agent-detail-artifact-grid {
        grid-template-columns: 1fr;
      }
      .agent-record-card__top {
        align-items: flex-start;
        flex-direction: column;
        gap: 4px;
      }
      .agent-record-card__title,
      .agent-record-card__desc,

      return [
        `你可以在对话框中直接描述${agent[1]}相关任务，${agent[0]}会按业务目标识别条件并拆解执行步骤。`,

          ['成', 'tone-green', '成交结构分析', '产品与户型成交结构、环比、换退房异常识别。为调价策略提供数据支撑。'],

        '项目成本分析助手': [

            name: agent[0],
            domain: agent[1],
            description: agent[2],
            avatarSrc: assetPath(index),
            instructions: getAgentInstructions(agent),
            questions: getAgentQuestions(agent),
            skills: getAgentSkills(agent),
            records: getAgentRecords(agent),
            artifacts: getAgentArtifacts(agent)

      }
      lastFocusedElement = document.activeElement;
      detailAvatar.src = assetPath(index);
      detailName.textContent = agent[0];
      detailDomain.textContent = agent[1];
      detailDesc.textContent = agent[2];
      detailInstructions.innerHTML = getAgentInstructions(agent).map(text => `<li>${text}</li>`).join('');
      detailQuestions.innerHTML = getAgentQuestions(agent).map(question => `
        <button class="agent-detail-question" type="button">
          <span>${question}</span>
          <svg viewBox="0 0 14 14" fill="none" aria-hidden="true"><path d="M5.25 3.5 8.75 7l-3.5 3.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
      `).join('');
      renderDetailTabData(agent);
      setDetailPanel('basic');
      if (detailCloseTimer !== null) {
        window.clearTimeout(detailCloseTimer);
        detailCloseTimer = null;
      }
      document.body.classList.remove('detail-modal-closing');
      document.body.classList.add('detail-modal-open');
      detailBackdrop.classList.remove('closing');
      detailBackdrop.classList.add('opening');
      detailBackdrop.setAttribute('aria-hidden', 'false');
      document.body.style.overflow = 'hidden';
      notifyParentDetailState('opening');
      window.setTimeout(() => {
        detailBackdrop.classList.remove('opening');
        detailBackdrop.classList.add('open');
        notifyParentDetailState('open');
        detailClose.focus();
      }, 200);
    }

    function closeAgentDetail() {
      if (!detailBackdrop.classList.contains('open') && !detailBackdrop.classList.contains('opening')) return;
      if (detailCloseTimer !== null) window.clearTimeout(detailCloseTimer);
      document.body.classList.remove('detail-modal-open');
      document.body.classList.add('detail-modal-closing');
      detailBackdrop.classList.remove('opening', 'open');
      detailBackdrop.classList.add('closing');
      detailBackdrop.setAttribute('aria-hidden', 'true');
      notifyParentDetailState('closing');
      detailCloseTimer = window.setTimeout(() => {
        detailBackdrop.classList.remove('closing');
        document.body.classList.remove('detail-modal-closing');
        document.body.style.overflow = '';
        detailCloseTimer = null;
        notifyParentDetailState('closed');
        if (lastFocusedElement && typeof lastFocusedElement.focus === 'function') {
          lastFocusedElement.focus();
        }
      }, 200);
    }

    function filterAgents() {
      const keyword = marketSearch.value.trim().toLowerCase();
      const visible = agents.filter(item => {
        const categoryMatched = activeCategory === '全部' || item[1] === activeCategory;
        const searchMatched = !keyword || item.join(' ').toLowerCase().includes(keyword);
        return categoryMatched && searchMatched;
      });
      renderAgentCards(visible);
    }

    filterAgents();

    grid.addEventListener('click', event => {
      const target = event.target;
      const card = target.closest('.agent-card');
      if (!card) return;
      event.preventDefault();
      openAgentDetail(Number(card.dataset.agentIndex));
    });

    grid.addEventListener('keydown', event => {
      if (event.key !== 'Enter' && event.key !== ' ') return;
      const card = event.target.closest('.agent-card');
      if (!card) return;
      event.preventDefault();
      openAgentDetail(Number(card.dataset.agentIndex));
    });

    detailTabs.forEach(tab => {
      tab.addEventListener('click', () => setDetailPanel(tab.dataset.panel));
    });

    detailClose.addEventListener('click', closeAgentDetail);
    detailCancel.addEventListener('click', closeAgentDetail);
    detailBackdrop.addEventListener('click', event => {
      if (event.target === detailBackdrop) closeAgentDetail();
    });

    window.addEventListener('message', event => {
      if (event.origin !== window.location.origin) return;
      const data = event.data;
      if (data && data.source === 'native-shell' && data.action === 'close-agent-detail') {
        closeAgentDetail();
      }
    });

    window.addEventListener('keydown', event => {
      if (event.key === 'Escape' && detailBackdrop.classList.contains('open')) {
        closeAgentDetail();
      }
    });

    document.querySelectorAll('.market-tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.market-tab').forEach(item => item.classList.remove('active'));
        tab.classList.add('active');
        activeCategory = tab.textContent.trim();
        filterAgents();
      });
    });

    marketSearch.addEventListener('input', filterAgents);
  </script>
</body>
</html>
