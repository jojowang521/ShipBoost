<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>技能</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f8fa;
      --card: #fff;
      --text: #1f2329;
      --muted: #646a73;
      --line: #e9edf2;
      --active: #3478f6;
      --shadow: 0 1px 2px rgba(15, 23, 42, .04);
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; }
    html, body { width: 100%; height: 100%; margin: 0; }
    body { overflow: hidden; background: var(--bg); color: var(--text); }

    .market-page {
      display: flex;
      flex-direction: column;
      width: 100%;
      height: 100%;
      padding: 12px 100px 8px;
      overflow: hidden;
      scrollbar-width: none;
      -ms-overflow-style: none;
      background: #f7f8fa;
    }

    .market-page::-webkit-scrollbar {
      width: 0;
      height: 0;
      display: none;
    }

    .market-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
      width: 100%;
      height: 36px;
      margin: 0 0 12px;
      flex: 0 0 auto;
    }

    h1 {
      margin: 0;
      color: #25272c;
      font-size: 18px;
      font-weight: 700;
      line-height: 24px;
      letter-spacing: 0;
    }

    .market-controls {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
      width: 100%;
      margin: 0 0 12px;
      flex: 0 0 auto;
    }

    .market-search {
      display: flex;
      align-items: center;
      width: 240px;
      height: 32px;
      flex: 0 0 240px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: #999;
      font-size: 13px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .market-search:focus-within {
      border-color: #ddd;
      box-shadow: var(--shadow);
    }

    .market-search input {
      min-width: 0;
      flex: 1 1 auto;
      height: 100%;
      padding: 0 8px 0 12px;
      border: 0;
      outline: 0;
      background: transparent;
      color: #333;
      font: inherit;
      line-height: 22px;
    }

    .market-search input::placeholder {
      color: #999;
    }

    .market-search input::-webkit-search-decoration,
    .market-search input::-webkit-search-cancel-button {
      appearance: none;
      -webkit-appearance: none;
    }

    .market-search__addon {
      display: inline-flex;
      width: 32px;
      height: 100%;
      flex: 0 0 32px;
      align-items: center;
      justify-content: center;
      border-left: 1px solid #ddd;
      background: #fff;
    }

    .market-search__addon img {
      display: block;
      width: 16px;
      height: 16px;
    }

    .market-tabs {
      display: flex;
      gap: 12px;
      min-width: 0;
      flex: 1 1 auto;
      margin: 0;
      padding: 0;
      overflow-x: auto;
      height: 32px;
      align-items: flex-start;
    }

    .market-tab {
      flex: 0 0 auto;
      height: 32px;
      padding: 3px 12px;
      border: 0;
      border-radius: 8px;
      background: transparent;
      color: #555d6b;
      font-size: 13px;
      font-weight: 500;
      line-height: 22px;
      cursor: pointer;
    }

    .market-tab:hover {
      background: #f2f4f6;
    }

    .market-tab.active {
      background: #e9ecff;
      color: #222;
    }

    .skill-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(230px, 1fr));
      gap: 12px;
      width: 100%;
      margin: 0;
    }

    .market-scroll {
      flex: 1 1 auto;
      min-height: 0;
      overflow: auto;
      padding: 12px 0 8px;
      scrollbar-width: none;
      -ms-overflow-style: none;
    }

    .market-scroll::-webkit-scrollbar {
      width: 0;
      height: 0;
      display: none;
    }

    .skill-card {
      min-height: 142px;
      padding: 18px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: var(--card);
      box-shadow: var(--shadow);
      cursor: pointer;
      transition: transform .18s ease, box-shadow .18s ease, border-color .18s ease;
    }

    .skill-card:hover,
    .skill-card:focus {
      transform: translateY(-2px);
      border-color: #cfe0ff;
      box-shadow: 0 8px 24px rgba(15, 23, 42, .08);
      outline: 0;
    }

    .skill-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
    }

    .skill-id {
      display: flex;
      align-items: center;
      min-width: 0;
      gap: 12px;
    }

    .skill-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 34px;
      height: 34px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 700;
      flex: 0 0 auto;
    }

    .tone-blue { background: #eaf3ff; color: #4c8dff; }
    .tone-cyan { background: #e8f8ff; color: #38a9df; }
    .tone-orange { background: #fff1df; color: #ff9d3d; }
    .tone-violet { background: #f2e8ff; color: #9363f2; }
    .tone-green { background: #e9f9f1; color: #45b879; }
    .tone-rose { background: #ffe8f1; color: #ef5b8b; }

    .skill-card h2 {
      margin: 0;
      overflow: hidden;
      min-width: 0;
      color: #22252b;
      font-size: 14px;
      font-weight: 600;
      line-height: 1.35;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .skill-action {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex: 0 0 auto;
      height: 28px;
      min-width: 52px;
      padding: 0 12px;
      border: 1px solid #d8dde6;
      border-radius: 8px;
      background: #fff;
      color: #4e5969;
      font-size: 12px;
      font-weight: 500;
      line-height: 26px;
      white-space: nowrap;
      cursor: pointer;
      opacity: 0;
      pointer-events: none;
      transition: opacity .16s ease, border-color .16s ease, color .16s ease, background .16s ease;
    }

    .skill-card:hover .skill-action,
    .skill-card:focus-within .skill-action {
      opacity: 1;
      pointer-events: auto;
    }

    .skill-action:hover {
      border-color: #C7D1FF;
      color: #3456F0;
      background: #fff;
    }

    .skill-card p {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.65;
    }

    .skill-modal-overlay {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: rgba(0, 0, 0, .34);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      opacity: 0;
      pointer-events: none;
      transition: opacity 200ms ease;
    }

    .skill-modal-overlay.is-opening,
    .skill-modal-overlay.is-open {
      opacity: 1;
      pointer-events: auto;
    }

    .skill-modal-overlay.is-closing {
      opacity: 0;
      pointer-events: none;
    }

    .skill-modal {
      display: flex;
      flex-direction: column;
      width: min(640px, calc(100vw - 48px));
      max-height: calc(100vh - 48px);
      overflow: hidden;
      border-radius: 12px;
      background: #fff;
      box-shadow: 0 3px 8px rgba(0, 0, 0, .1);
      color: #333;
      opacity: 0;
      transform: translateY(8px) scale(.992);
      transition: opacity 200ms ease, transform 200ms ease;
    }

    .skill-modal-overlay.is-opening .skill-modal,
    .skill-modal-overlay.is-open .skill-modal {
      opacity: 1;
      transform: translateY(0) scale(1);
    }

    .skill-modal-overlay.is-closing .skill-modal {
      opacity: 0;
      transform: translateY(8px) scale(.992);
    }

    .skill-modal:focus {
      outline: 0;
    }

    .skill-modal__header {
      display: flex;
      align-items: center;
      gap: 12px;
      height: 48px;
      padding: 12px 20px;
    }

    .skill-modal__title {
      flex: 1 1 auto;
      margin: 0;
      font-size: 18px;
      font-weight: 600;
      line-height: 26px;
    }

    .skill-modal__close {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 28px;
      height: 28px;
      border: 0;
      border-radius: 8px;
      background: transparent;
      color: #999;
      cursor: pointer;
      transition: background-color .16s ease;
    }

    .skill-modal__close img {
      display: block;
      width: 28px;
      height: 28px;
      pointer-events: none;
    }

    .skill-modal__close:hover {
      background: #f7f8fa;
    }

    .skill-modal__body {
      display: flex;
      flex-direction: column;
      gap: 18px;
      flex: 1 1 auto;
      overflow-y: auto;
      padding: 22px 20px 0;
    }

    .skill-modal__profile {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .skill-modal__icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex: 0 0 auto;
      width: 44px;
      height: 44px;
      border-radius: 8px;
      background: #eef5ff;
      color: #266eff;
      font-size: 16px;
      font-weight: 600;
      line-height: 24px;
    }

    .skill-modal__name-row {
      display: flex;
      flex-direction: column;
      gap: 6px;
      min-width: 0;
      align-items: flex-start;
    }

    .skill-modal__name {
      margin: 0;
      overflow: hidden;
      color: #333;
      font-size: 16px;
      font-weight: 600;
      line-height: 22px;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .skill-modal__tag {
      flex: 0 0 auto;
      text-align: center;
    }

    .skill-modal__meta-tags {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 6px;
      min-width: 0;
    }

    .skill-modal__meta-tag {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      flex: 0 0 auto;
      height: 20px;
      min-width: 20px;
      max-width: 100%;
      padding: 0 6px;
      border: 0;
      border-radius: 4px;
      background: #f2f4f6;
      color: #576275;
      font-size: 12px;
      font-weight: 400;
      line-height: 20px;
      white-space: nowrap;
    }

    .skill-modal__meta-label {
      flex: 0 0 auto;
      color: inherit;
    }

    .skill-modal__meta-value {
      overflow: hidden;
      min-width: 0;
      text-overflow: ellipsis;
    }

    .skill-modal__section {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .skill-modal__section-title {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 0;
      padding: 5px 0;
      color: #333;
      font-size: 14px;
      font-weight: 600;
      line-height: 22px;
    }

    .skill-modal__section-title img,
    .skill-modal__section-title svg {
      flex: 0 0 auto;
      color: #576275;
    }

    .skill-modal__section-title img {
      width: 16px;
      height: 16px;
      display: block;
    }

    .skill-modal__description {
      min-height: 38px;
      margin: 0;
      padding: 9px 12px;
      border-radius: 8px;
      background: #f7f8fa;
      color: #333;
      font-size: 13px;
      font-weight: 400;
      line-height: 22px;
    }

    .skill-modal__usage {
      margin: 0;
      padding: 9px 12px;
      border-radius: 8px;
      background: #f7f8fa;
      color: #333;
      font-size: 13px;
      font-weight: 400;
      line-height: 22px;
    }

    .skill-modal__footer {
      display: flex;
      justify-content: flex-end;
      gap: 12px;
      padding: 20px;
    }

    .skill-modal__button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 80px;
      height: 32px;
      padding: 5px 12px;
      border: 1px solid #ddd;
      border-radius: 8px;
      background: #fff;
      color: #333;
      font-size: 13px;
      font-weight: 400;
      line-height: 22px;
      cursor: pointer;
    }

    .skill-modal__button:hover {
      border-color: #c7d1ff;
      color: #3456f0;
    }

    .skill-modal__button--primary {
      gap: 8px;
      border-color: #5147ff;
      background: #5147ff;
      color: #fff;
    }

    .skill-modal__button--primary:hover {
      border-color: #4037e8;
      background: #4037e8;
      color: #fff;
    }

    .skill-modal__button--primary svg {
      flex: 0 0 auto;
    }

    @media (max-width: 1180px) {
      .market-page { padding: 12px 32px 8px; }
      .skill-grid { grid-template-columns: repeat(3, minmax(220px, 1fr)); }
    }
    @media (max-width: 820px) {
      .market-head { align-items: flex-start; flex-direction: column; }
      .market-controls { align-items: stretch; flex-direction: column; gap: 12px; }
      .market-search { width: 100%; }
      .skill-grid { grid-template-columns: 1fr; }
      .skill-modal__meta-tags { width: 100%; }
      .skill-modal__footer { padding-top: 16px; }
    }
  </style>
</head>
<body>
  <main class="market-page">
    <header class="market-head">
      <h1>技能</h1>
    </header>
    <div class="market-controls">
      <nav class="market-tabs" aria-label="技能分类">
        <button class="market-tab active">全部</button>
        <button class="market-tab">通用</button>
        <button class="market-tab">基础数据</button>
        <button class="market-tab">成本</button>
        <button class="market-tab">售楼</button>
        <button class="market-tab">资管</button>
        <button class="market-tab">租赁</button>
      </nav>
      <label class="market-search" aria-label="搜索技能">
        <input id="marketSearch" type="search" placeholder="搜索技能" autocomplete="off">
        <span class="market-search__addon" aria-hidden="true">
          <img src="/agent-skill-market/icons/search.svg" alt="">
        </span>
      </label>
    </div>
    <div class="market-scroll">
      <section class="skill-grid" id="skillGrid" aria-label="技能列表"></section>
    </div>
  </main>
  <div class="skill-modal-overlay" id="skillModalOverlay" aria-hidden="true">
    <section class="skill-modal" role="dialog" aria-modal="true" aria-labelledby="skillModalTitle" tabindex="-1">
      <header class="skill-modal__header">
        <h2 class="skill-modal__title" id="skillModalTitle">技能详情</h2>
        <button class="skill-modal__close" type="button" aria-label="关闭技能详情" data-modal-close>
          <img src="/agent-skill-market/icons/close.svg" alt="">
        </button>
      </header>
      <div class="skill-modal__body">
        <div class="skill-modal__profile">
          <span class="skill-modal__icon" id="skillModalIcon">自</span>
          <div class="skill-modal__name-row">
            <h3 class="skill-modal__name" id="skillModalName">自然语言意图识别</h3>
            <div class="skill-modal__meta-tags" aria-label="技能基础信息">
              <span class="skill-modal__tag skill-modal__meta-tag" id="skillModalTag">通用</span>
              <span class="skill-modal__meta-tag">
                <span class="skill-modal__meta-label">开发者</span>
                <span class="skill-modal__meta-value" id="skillModalDeveloper">张三</span>
              </span>
              <span class="skill-modal__meta-tag">
                <span class="skill-modal__meta-label">版本</span>
                <span class="skill-modal__meta-value" id="skillModalVersion">1.0.1</span>
              </span>
              <span class="skill-modal__meta-tag">
                <span class="skill-modal__meta-label">更新时间</span>
                <span class="skill-modal__meta-value" id="skillModalUpdated">2026/01/01 12:00:00</span>
              </span>
            </div>
          </div>
        </div>
        <section class="skill-modal__section">
          <h4 class="skill-modal__section-title">
            <img src="/agent-skill-market/icons/instruction.svg" alt="">
            说明
          </h4>
          <p class="skill-modal__description" id="skillModalDescription">把用户的口语化提问解析为可执行的查询条件、参数、动作。</p>
        </section>
        <section class="skill-modal__section">
          <h4 class="skill-modal__section-title">
            <img src="/agent-skill-market/icons/message-record.svg" alt="">
            使用场景
          </h4>
          <p class="skill-modal__usage" id="skillModalUsage">适用于用户以自然语言发起查询、筛选、分析或执行任务，需要系统自动识别意图并转成可执行条件的场景。</p>
        </section>
      </div>
      <footer class="skill-modal__footer">
        <button class="skill-modal__button" type="button" data-modal-close>取消</button>
        <button class="skill-modal__button skill-modal__button--primary" type="button" id="skillModalAdd">
          <svg width="16" height="16" viewBox="0 0 16 16" aria-hidden="true">
            <path d="M8 3.6v8.8M3.6 8h8.8" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
          </svg>
          添加
        </button>
      </footer>
    </section>
  </div>
  <script>
    const tones = ['blue', 'cyan', 'orange', 'violet', 'green', 'rose'];
    const skills = [
      { name: '自然语言意图识别', category: '通用', description: '把用户的口语化提问解析为可执行的查询条件、参数、动作。', usage: '适用于用户以口语化方式发起查询、筛选、分析、填报等任务，需要系统自动识别条件、参数和动作的场景。', developer: '张三', version: '1.0.1', updatedAt: '2026/01/01 12:00:00' },
      { name: '多轮对话编排', category: '通用', description: '维持上下文，支持追问、改写、纠错，确保任务一次说不清也能闭环。', usage: '适用于用户信息不完整、需要连续追问补齐条件，并在多轮交互后形成可执行任务闭环的场景。', developer: '张三', version: '1.0.1', updatedAt: '2026/01/01 12:00:00' },
      { name: '文档 OCR 识别', category: '通用', description: '图片、扫描件、PDF 中提取文字与版面信息，含手写体与盖章页处理。', usage: '适用于合同扫描件、付款附件、票据图片等非结构化资料，需要先识别文字和版面信息的场景。', developer: '张三', version: '1.0.1', updatedAt: '2026/01/01 12:00:00' },
      { name: '表格结构化抽取', category: '通用', description: '从图片或非结构化文档中识别表格，输出标准行列数据。', usage: '适用于清单、台账、报价单等资料未形成标准数据表，需要自动还原行列结构并进入后续分析的场景。', developer: '张三', version: '1.0.1', updatedAt: '2026/01/01 12:00:00' },
      { name: '审批规则校验', category: '基础数据', description: '业务资料与系统数据按规则对比，输出风险清单。', usage: '适用于合同审核、付款预审、流程审批等需要按规则比对业务资料与系统数据并输出风险清单的场景。', developer: '张三', version: '1.0.1', updatedAt: '2026/01/01 12:00:00' },
      { name: '待办消息检索', category: '基础数据', description: '按账号实时聚合待办、待阅，按优先级排序。', usage: '适用于用户需要快速查看个人待办、待阅、催办事项，并按时间、风险或优先级聚合处理的场景。', developer: '张三', version: '1.0.1', updatedAt: '2026/01/01 12:00:00' },
      { name: '权限定位', category: '基础数据', description: '输入账号即输出权限清单与摘要，定位权限设置问题。', usage: '适用于账号无法访问菜单、数据范围异常、审批权限缺失等需要快速定位权限配置问题的场景。', developer: '张三', version: '1.0.1', updatedAt: '2026/01/01 12:00:00' },
      { name: '文档辅助阅读', category: '基础数据', description: '文档加问题，快速生成内容总结并定位引用。', usage: '适用于制度、合同、报告等长文档阅读，需要围绕问题提炼结论并定位原文依据的场景。', developer: '张三', version: '1.0.1', updatedAt: '2026/01/01 12:00:00' },
      { name: '科目指标分析', category: '成本', description: '覆盖 30+ 标准指标，按项目、科目、业态、趋势 4 视角问数与分析。', usage: '适用于成本科目对比、项目指标复盘、业态差异分析和趋势异常识别等成本分析场景。', developer: '张三', version: '1.0.1', updatedAt: '2026/01/01 12:00:00' },
      { name: '清单组价', category: '成本', description: '基于市场价库和历史成本，自动完成工程量清单组价。', usage: '适用于控制价编制、招标清单测算、历史项目对标，需要结合市场价库完成清单组价的场景。', developer: '张三', version: '1.0.1', updatedAt: '2026/01/01 12:00:00' },
      { name: '控制价审核报告生成', category: '成本', description: '汇总科目对比、清单组价合理性、风险点，输出审核报告。', usage: '适用于控制价审核完成后，需要汇总指标偏差、组价合理性、风险点并形成可交付报告的场景。', developer: '张三', version: '1.0.1', updatedAt: '2026/01/01 12:00:00' },
      { name: '付款规则预审', category: '成本', description: '从概算、合同、账户、发票、工程量、进度等维度批量校验。', usage: '适用于付款申请提交前，对合同、发票、账户、工程进度和概算占用进行批量校验的场景。', developer: '张三', version: '1.0.1', updatedAt: '2026/01/01 12:00:00' },
      { name: '一房一价测算', category: '售楼', description: '自动筛选房源、计算调价方案并评估货值影响。', usage: '适用于批量调价、库存去化、房源价格策略测算，需要快速输出一房一价方案的场景。', developer: '张三', version: '1.0.1', updatedAt: '2026/01/01 12:00:00' },
      { name: '成交结构分析', category: '售楼', description: '产品与户型成交结构、同环比、换退房异常识别。', usage: '适用于营销复盘、产品去化分析、换退房异常排查，需要从成交结构中发现问题的场景。', developer: '张三', version: '1.0.1', updatedAt: '2026/01/01 12:00:00' },
      { name: '跨台账查询', category: '资管', description: '覆盖项目、资产、资源、合同、费用、收缴等业务台账的跨表查询。', usage: '适用于资产、资源、合同、费用、收缴等信息分散在多张台账，需要一次性跨表查询的场景。', developer: '张三', version: '1.0.1', updatedAt: '2026/01/01 12:00:00' },
      { name: '经营复盘生成', category: '资管', description: '自动汇总经营数据并提炼结论，输出经营复盘材料。', usage: '适用于月度经营复盘、项目运营汇报、租收分析等需要汇总数据并生成复盘材料的场景。', developer: '张三', version: '1.0.1', updatedAt: '2026/01/01 12:00:00' },
      { name: '租赁合同抽取', category: '租赁', description: '租赁合同要素抽取与自动结构化，提升录入吞吐量与准确率。', usage: '适用于租赁合同录入、合同台账补全、关键条款归档，需要自动抽取合同要素的场景。', developer: '张三', version: '1.0.1', updatedAt: '2026/01/01 12:00:00' },
      { name: '商务条款审核', category: '租赁', description: '对照租赁商务政策审核条款合理性，保障租赁合同收益。', usage: '适用于租赁合同审批、商务政策校验、收益风险排查，需要审核条款合理性的场景。', developer: '张三', version: '1.0.1', updatedAt: '2026/01/01 12:00:00' }
    ];

    const grid = document.getElementById('skillGrid');
    const marketSearch = document.getElementById('marketSearch');
    const modalOverlay = document.getElementById('skillModalOverlay');
    const modalDialog = modalOverlay.querySelector('.skill-modal');
    const modalIcon = document.getElementById('skillModalIcon');
    const modalName = document.getElementById('skillModalName');
    const modalTag = document.getElementById('skillModalTag');
    const modalDeveloper = document.getElementById('skillModalDeveloper');
    const modalVersion = document.getElementById('skillModalVersion');
    const modalUpdated = document.getElementById('skillModalUpdated');
    const modalDescription = document.getElementById('skillModalDescription');
    const modalUsage = document.getElementById('skillModalUsage');
    const modalAdd = document.getElementById('skillModalAdd');
    let lastFocusedElement = null;
    let modalCloseTimer = null;
    let activeCategory = '全部';

    function notifyParentModalState(isOpen) {
      if (window.parent && window.parent !== window) {
        window.parent.postMessage({
          type: isOpen ? 'market-detail-modal-open' : 'market-detail-modal-close'
        }, window.location.origin);
      }
    }

    function openSkillModal(skill) {
      lastFocusedElement = document.activeElement;
      modalIcon.textContent = skill.name.slice(0, 1);
      modalName.textContent = skill.name;
      modalTag.textContent = skill.category;
      modalDeveloper.textContent = skill.developer;
      modalVersion.textContent = skill.version;
      modalUpdated.textContent = skill.updatedAt;
      modalDescription.textContent = skill.description;
      modalUsage.textContent = skill.usage || '适用于需要复用该能力完成业务识别、校验、分析或结果生成的场景。';
      modalAdd.setAttribute('aria-label', `添加${skill.name}`);
      if (modalCloseTimer !== null) {
        window.clearTimeout(modalCloseTimer);
        modalCloseTimer = null;
      }
      notifyParentModalState(true);
      modalOverlay.classList.remove('is-closing');
      modalOverlay.classList.add('is-opening');
      modalOverlay.setAttribute('aria-hidden', 'false');
      document.body.style.overflow = 'hidden';
      window.setTimeout(() => {
        modalOverlay.classList.remove('is-opening');
        modalOverlay.classList.add('is-open');
        modalDialog.focus();
      }, 200);
    }

    function closeSkillModal() {
      if (!modalOverlay.classList.contains('is-open') && !modalOverlay.classList.contains('is-opening')) return;
      if (modalCloseTimer !== null) window.clearTimeout(modalCloseTimer);
      notifyParentModalState(false);
      modalOverlay.classList.remove('is-opening', 'is-open');
      modalOverlay.classList.add('is-closing');
      modalOverlay.setAttribute('aria-hidden', 'true');
      modalCloseTimer = window.setTimeout(() => {
        modalOverlay.classList.remove('is-closing');
        document.body.style.overflow = '';
        modalCloseTimer = null;
        if (lastFocusedElement && typeof lastFocusedElement.focus === 'function') {
          lastFocusedElement.focus();
        }
      }, 200);
    }

    function render(list) {
      grid.innerHTML = list.map(item => {
        const sourceIndex = skills.findIndex(source => source.name === item.name);
        const tone = tones[sourceIndex % tones.length];
        return `
          <article class="skill-card" tabindex="0" role="button" data-skill-name="${item.name}" aria-label="查看${item.name}技能详情">
            <div class="skill-top">
              <div class="skill-id">
                <span class="skill-icon tone-${tone}">${item.name.slice(0, 1)}</span>
                <h2>${item.name}</h2>
              </div>
              <button class="skill-action" type="button" aria-label="安装${item.name}">安装</button>
            </div>
            <p>${item.description}</p>
          </article>
        `;
      }).join('');
    }

    function filterSkills() {
      const keyword = marketSearch.value.trim().toLowerCase();
      const visible = skills.filter(item => {
        const categoryMatched = activeCategory === '全部' || item.category === activeCategory;
        const searchMatched = !keyword || `${item.name} ${item.category} ${item.description} ${item.usage || ''}`.toLowerCase().includes(keyword);
        return categoryMatched && searchMatched;
      });
      render(visible);
    }

    filterSkills();

    grid.addEventListener('click', event => {
      const card = event.target.closest('.skill-card');
      if (!card) return;
      const skill = skills.find(item => item.name === card.dataset.skillName);
      if (skill) openSkillModal(skill);
    });

    grid.addEventListener('keydown', event => {
      if (event.key !== 'Enter' && event.key !== ' ') return;
      const card = event.target.closest('.skill-card');
      if (!card) return;
      event.preventDefault();
      const skill = skills.find(item => item.name === card.dataset.skillName);
      if (skill) openSkillModal(skill);
    });

    modalOverlay.addEventListener('click', event => {
      if (event.target === modalOverlay || event.target.closest('[data-modal-close]')) {
        closeSkillModal();
      }
    });

    modalAdd.addEventListener('click', closeSkillModal);

    document.addEventListener('keydown', event => {
      if (event.key === 'Escape' && modalOverlay.classList.contains('is-open')) {
        closeSkillModal();
      }
    });

    document.querySelectorAll('.market-tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.market-tab').forEach(item => item.classList.remove('active'));
        tab.classList.add('active');
        activeCategory = tab.textContent.trim();
        filterSkills();
      });
    });

    marketSearch.addEventListener('input', filterSkills);
  </script>
</body>
</html>
